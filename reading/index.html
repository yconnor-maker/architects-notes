<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immersive Reading — Architect's Notes</title>
    <meta name="description" content="The immersive scrollytelling experience. Synchronized text and video — read along as Dr. Yamicia Connor reads Broken Vase, Episode 1.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scrolly-container">
        <!-- Video Section (Fixed) -->
        <div class="video-panel">
            <div class="video-wrapper">
                <div id="readingVideo"></div>
            </div>

            <div class="video-details">
                <h2 class="book-title">Broken Vase</h2>
                <div class="scene-title">Dramatic Reading — Episode 1: The Visit</div>
            </div>

            <div class="cta-container">
                <a href="https://yamiciadconnor.substack.com/subscribe" class="btn-primary">Become a Member</a>
                <a href="/" class="btn-secondary">&larr; Back to Architect's Notes</a>
            </div>
        </div>

        <!-- Transcript Section (Scrollable) -->
        <div class="transcript-panel">
            <div class="transcript-content" id="transcriptContainer">
                <div class="transcript-intro">
                    <h1>The Visit</h1>
                    <p class="subtitle">Press play or click any passage to experience the reading.</p>
                </div>

                <div class="transcript-line" data-start="0" data-end="5">
                    <p>Loading transcript...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="app.js"></script>
</body>
</html>
